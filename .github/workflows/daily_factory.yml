name: CHANNEL FACTORY - Daily Auto Post (English„ÉĽ20 videos/day)

on:
  schedule:
    # śĮéśó•śúĚ9śôāÔľąJSTÔľČ„ĀęŚģüŤ°Ć ‚Üí UTC„ĀĮ0śôā
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      channel:
        description: 'ÁČĻŚģö„ÉĀ„É£„É≥„Éć„Éę„Āģ„ĀŅŚģüŤ°ĆÔľąÁ©ļś¨Ą=ŚÖ®10„ÉĀ„É£„É≥„Éć„ÉęÔľČ'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  factory:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configure git for auto-commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            chromium-browser \
            fonts-noto-cjk \
            fonts-noto-cjk-extra \
            xvfb

      - name: Install Python packages
        run: |
          pip install \
            edge-tts \
            pydub \
            deep-translator \
            google-api-python-client \
            google-auth-oauthlib \
            google-auth-httplib2

      - name: Install Node packages
        run: npm install

      # śó•śú¨Ť™ěÁČą10„ÉĀ„É£„É≥„Éć„ÉęŚąÜ„Āģtoken.json„āíSecret„Āč„āČŚĺ©ŚÖÉ
      - name: Restore YouTube credentials
        run: |
          mkdir -p credentials
          echo "${{ secrets.TOKEN_AGENT_ZERO }}"    | base64 -d > credentials/token_agent_zero.json
          echo "${{ secrets.TOKEN_GOLD_DATA_LAB }}" | base64 -d > credentials/token_gold_data_lab.json
          echo "${{ secrets.TOKEN_MYTH_BREAKER }}"  | base64 -d > credentials/token_myth_breaker.json
          echo "${{ secrets.TOKEN_MONEY_LAB }}"     | base64 -d > credentials/token_money_lab.json
          echo "${{ secrets.TOKEN_BEAUTY_LAB }}"    | base64 -d > credentials/token_beauty_lab.json
          echo "${{ secrets.TOKEN_HISTORY_CRASH }}" | base64 -d > credentials/token_history_crash.json
          echo "${{ secrets.TOKEN_BODY_LAB }}"      | base64 -d > credentials/token_body_lab.json
          echo "${{ secrets.TOKEN_CRYPTO_SIGNAL }}" | base64 -d > credentials/token_crypto_signal.json
          echo "${{ secrets.TOKEN_WORK_HACK }}"     | base64 -d > credentials/token_work_hack.json
          echo "${{ secrets.TOKEN_DARK_TALES }}"    | base64 -d > credentials/token_dark_tales.json

      # English ‚ÄĒ 3 active channels
      - name: Run Channel Factory
        env:
          DISPLAY: ':99'
          CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          if [ -n "$CHANNEL" ]; then
            python engine/factory.py --channel "$CHANNEL" --lang en
          else
            python engine/factory.py --channel agent_zero --lang en
            python engine/factory.py --channel gold_data_lab --lang en
            python engine/factory.py --channel myth_breaker --lang en
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: factory-report-${{ github.run_number }}
          path: |
            channels/output/**/out/youtube_metadata.txt
            factory_report.txt
          retention-days: 7

      # GitHub„ĀģActions„Éö„Éľ„āł„ĀęÁĶźśěú„āĶ„Éě„É™„Éľ„āíŤ°®Á§ļ
      - name: Show summary
        if: always()
        run: |
          echo "## Daily Upload Results (English)" >> $GITHUB_STEP_SUMMARY
          echo "3 channels √ó 1 long + 1 short = **6 videos**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat factory_report.txt >> $GITHUB_STEP_SUMMARY || echo "No report" >> $GITHUB_STEP_SUMMARY
